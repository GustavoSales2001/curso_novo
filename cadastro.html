<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Criar Conta - CVIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #111827 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f8fafc;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Elementos decorativos de fundo */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(56, 189, 248, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(56, 189, 248, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .signup-wrapper {
      width: 100%;
      max-width: 500px;
      z-index: 1;
      position: relative;
    }

    .form-container {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      padding: 45px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(56, 189, 248, 0.1);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-header {
      text-align: center;
      margin-bottom: 8px;
    }

    .form-header h1 {
      font-size: 2rem;
      color: #38bdf8;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .form-header p {
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-row.full {
      grid-template-columns: 1fr;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      color: #cbd5e1;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(56, 189, 248, 0.2);
      background: rgba(15, 23, 42, 0.8);
      color: #f8fafc;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .form-group input::placeholder,
    .form-group select option {
      color: #64748b;
    }

    .form-group select option {
      background: #0f172a;
      color: #f8fafc;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #38bdf8;
      background: rgba(15, 23, 42, 1);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
    }

    .form-group input:hover,
    .form-group select:hover {
      border-color: #38bdf8;
    }

    .password-info {
      background: rgba(56, 189, 248, 0.05);
      border: 1px solid rgba(56, 189, 248, 0.15);
      border-radius: 8px;
      padding: 12px;
      font-size: 0.85rem;
      color: #cbd5e1;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .password-info::before {
      content: 'ℹ';
      color: #38bdf8;
      font-weight: bold;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #0f172a;
      font-size: 1rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-shadow: 0 5px 20px rgba(56, 189, 248, 0.3);
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      pointer-events: none;
    }

    .divider {
      text-align: center;
      color: #64748b;
      font-size: 0.85rem;
      margin: 8px 0;
    }

    .login-link {
      text-align: center;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    .login-link a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.3s ease;
      border-bottom: 1px solid transparent;
    }

    .login-link a:hover {
      border-bottom-color: #38bdf8;
      color: #0ea5e9;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(248, 250, 252, 0.3);
      border-top-color: #f8fafc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .form-container {
        padding: 30px;
      }

      .form-row {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .form-header h1 {
        font-size: 1.6rem;
      }

      .signup-wrapper {
        max-width: 100%;
      }

      body {
        padding: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="signup-wrapper">
    <div class="form-container">
      <div class="form-header">
        <h1>Crie sua conta</h1>
        <p>Junte-se à nossa comunidade e comece a aprender</p>
      </div>

      <form id="cadastroForm" onsubmit="cadastrar(event)">
        <div class="form-row full">
          <div class="form-group">
            <label for="nome">Nome Completo *</label>
            <input 
              type="text" 
              id="nome" 
              placeholder="Seu nome completo"
              required
              autocomplete="name"
            >
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">E-mail *</label>
            <input 
              type="email" 
              id="email" 
              placeholder="seu.email@exemplo.com"
              required
              autocomplete="email"
            >
          </div>

          <div class="form-group">
            <label for="celular">Celular *</label>
            <input 
              type="tel" 
              id="celular" 
              placeholder="(11) 99999-9999"
              required
              autocomplete="tel"
            >
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="nascimento">Data de Nascimento *</label>
            <input 
              type="date" 
              id="nascimento"
              required
            >
          </div>

          <div class="form-group">
            <label for="area">Área de Interesse</label>
            <select id="area">
              <option value="">Escolha uma área</option>
              <option value="Marketing">Marketing</option>
              <option value="TI">Tecnologia da Informação</option>
              <option value="Administrativo">Administrativo</option>
              <option value="Financeiro">Financeiro</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="senha">Crie uma Senha *</label>
          <input 
            type="password" 
            id="senha" 
            placeholder="Senha forte com números e caracteres especiais"
            required
            autocomplete="new-password"
          >
          <div class="password-info">
            Use 8+ caracteres, números e símbolos para uma senha mais segura
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          Criar minha conta
        </button>
      </form>

      <div class="divider">ou</div>

      <div class="login-link">
        Já tem uma conta? <a href="login.html">Faça seu login aqui</a>
      </div>
    </div>
  </div>

<script src="notifications.js"></script>

<script>
  const API_BASE_URL = "https://cursoslove-production.up.railway.app/api";

  const cadastroForm = document.getElementById('cadastroForm');
  const submitBtn = document.getElementById('submitBtn');

  async function cadastrar(event) {
    event.preventDefault();

    const nome = document.getElementById("nome").value.trim();
    const email = document.getElementById("email").value.trim();
    const celular = document.getElementById("celular").value.trim();
    const nascimento = document.getElementById("nascimento").value;
    const area = document.getElementById("area").value;
    const senha = document.getElementById("senha").value.trim();

    // Validações
    if (!nome || !email || !celular || !nascimento || !senha) {
      notify.warning("Por favor, preencha todos os campos obrigatórios");
      return;
    }

    // Validar email
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      notify.error("Por favor, insira um e-mail válido");
      return;
    }

    // Validar senha
    if (senha.length < 6) {
      notify.warning("A senha deve ter no mínimo 6 caracteres");
      return;
    }

    // Validar idade (deve ter 18+ anos)
    const dataNasc = new Date(nascimento);
    const dataAtual = new Date();
    let idade = dataAtual.getFullYear() - dataNasc.getFullYear();
    const mesAtual = dataAtual.getMonth();
    const mesNasc = dataNasc.getMonth();
    
    if (mesAtual < mesNasc || (mesAtual === mesNasc && dataAtual.getDate() < dataNasc.getDate())) {
      idade--;
    }

    if (idade < 18) {
      notify.error("Você deve ter no mínimo 18 anos para se cadastrar");
      return;
    }

    // Desabilitar botão e mostrar loading
    submitBtn.disabled = true;
    const originalText = submitBtn.textContent;
    submitBtn.innerHTML = '<span class="spinner"></span> Criando conta...';

    try {
      const response = await fetch(`${API_BASE_URL}/users/register`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name: nome,
          email,
          password: senha,
          celular,
          nascimento,
          area
        })
      });

      const data = await response.json();

      if (!response.ok) {
        notify.error(data.error || "Erro ao criar a conta. Tente novamente.");
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
        return;
      }

      localStorage.setItem("usuario", JSON.stringify({
        id: data.user.id,
        nome,
        email,
        celular,
        nascimento,
        area
      }));

      notify.success("Conta criada com sucesso! Redirecionando para login...", 2000);
      
      setTimeout(() => {
        window.location.href = "login.html";
      }, 500);

    } catch (error) {
      console.error("Erro no cadastro:", error);
      notify.error("Erro ao conectar com o servidor. Tente novamente mais tarde.");
      submitBtn.disabled = false;
      submitBtn.textContent = originalText;
    }
  }
</script>

</body>
</html>
