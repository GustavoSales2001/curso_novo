<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inbox WhatsApp</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      background: #111b21;
      color: #111;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
      width: 100vw;
      background: #111b21;
    }

    .sidebar {
      width: 360px;
      min-width: 320px;
      background: #111b21;
      color: white;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a3942;
    }

    .sidebar-header {
      height: 64px;
      padding: 12px 16px;
      background: #202c33;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-avatar,
    .avatar {
      border-radius: 50%;
      background: linear-gradient(135deg, #00a884, #128c7e);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .brand-avatar {
      width: 42px;
      height: 42px;
      font-size: 18px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      font-size: 15px;
    }

    .chat-header .avatar {
      width: 46px;
      height: 46px;
    }

    .brand-title {
      font-weight: bold;
      font-size: 17px;
    }

    .brand-subtitle {
      font-size: 12px;
      color: #aebac1;
      margin-top: 2px;
    }

    .search {
      padding: 10px 12px;
      background: #111b21;
      border-bottom: 1px solid #202c33;
    }

    .search input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 22px;
      border: none;
      outline: none;
      background: #202c33;
      color: #e9edef;
      font-size: 14px;
    }

    .search input::placeholder {
      color: #8696a0;
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
    }

    .conversation {
      display: flex;
      gap: 12px;
      padding: 12px 14px;
      cursor: pointer;
      border-bottom: 1px solid #202c33;
      transition: 0.15s;
    }

    .conversation:hover {
      background: #202c33;
    }

    .conversation.active {
      background: #2a3942;
    }

    .conversation-content {
      flex: 1;
      min-width: 0;
    }

    .conversation-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .conversation-name {
      font-weight: bold;
      font-size: 15px;
      color: #e9edef;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-time {
      font-size: 11px;
      color: #8696a0;
      flex-shrink: 0;
    }

    .conversation-last {
      color: #aebac1;
      font-size: 13px;
      margin-top: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0b141a;
    }

    .chat-header {
      height: 64px;
      background: #202c33;
      color: #e9edef;
      border-bottom: 1px solid #2a3942;
      padding: 9px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header-info {
      flex: 1;
      min-width: 0;
    }

    .chat-title {
      font-weight: bold;
      font-size: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-status {
      font-size: 12px;
      color: #aebac1;
      margin-top: 2px;
    }

    .header-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bot-toggle {
      border: none;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: #00a884;
      transition: 0.15s;
      white-space: nowrap;
    }

    .bot-toggle:hover {
      filter: brightness(1.08);
    }

    .bot-toggle.paused {
      background: #ef4444;
    }

    .menu-btn {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: #aebac1;
      font-size: 24px;
      cursor: pointer;
    }

    .menu-btn:hover {
      background: #2a3942;
      color: #e9edef;
    }

    .messages {
      flex: 1;
      padding: 22px 7%;
      overflow-y: auto;
      background-color: #0b141a;
      background-image:
        radial-gradient(circle at 25px 25px, rgba(255,255,255,0.035) 2%, transparent 0%),
        radial-gradient(circle at 75px 75px, rgba(255,255,255,0.035) 2%, transparent 0%);
      background-size: 100px 100px;
    }

    .day-separator {
      display: flex;
      justify-content: center;
      margin: 10px 0 18px;
    }

    .day-separator span {
      background: #182229;
      color: #aebac1;
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .message-row {
      width: 100%;
      display: flex;
      margin-bottom: 7px;
    }

    .message-row.in {
      justify-content: flex-start;
    }

    .message-row.out {
      justify-content: flex-end;
    }

    .message {
      width: fit-content;
      max-width: 58%;
      padding: 7px 9px 5px;
      border-radius: 8px;
      line-height: 1.38;
      font-size: 14px;
      white-space: pre-wrap;
      position: relative;
      box-shadow: 0 1px 2px rgba(0,0,0,0.24);
      word-break: break-word;
    }

    .message.in {
      background: #202c33;
      color: #e9edef;
      border-top-left-radius: 2px;
    }

    .message.out {
      background: #005c4b;
      color: #e9edef;
      border-top-right-radius: 2px;
    }

    .message-text {
      padding-right: 50px;
    }

    .time {
      font-size: 10.5px;
      color: #b7c4cb;
      opacity: 0.8;
      margin-top: 2px;
      text-align: right;
      float: right;
      margin-left: 8px;
      transform: translateY(3px);
      white-space: nowrap;
    }

    .composer {
      min-height: 64px;
      padding: 10px 14px;
      background: #202c33;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: none;
      background: transparent;
      color: #aebac1;
      border-radius: 50%;
      cursor: pointer;
      font-size: 22px;
    }

    .icon-btn:hover {
      background: #2a3942;
      color: #e9edef;
    }

    .composer textarea {
      flex: 1;
      min-height: 42px;
      max-height: 110px;
      resize: none;
      border: none;
      border-radius: 22px;
      padding: 12px 16px;
      outline: none;
      background: #2a3942;
      color: #e9edef;
      font-size: 14px;
    }

    .composer textarea::placeholder {
      color: #8696a0;
    }

    .send-btn {
      width: 46px;
      height: 46px;
      border: none;
      background: #00a884;
      color: white;
      border-radius: 50%;
      cursor: pointer;
      font-weight: bold;
      font-size: 19px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover {
      background: #06cf9c;
    }

    .send-btn:disabled {
      background: #54656f;
      cursor: not-allowed;
    }

    .empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8696a0;
      font-size: 18px;
      text-align: center;
      flex-direction: column;
      gap: 10px;
    }

    .empty-icon {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #202c33;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 82px;
      background: #202c33;
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      display: none;
      z-index: 20;
      font-size: 14px;
    }

    .back-btn {
      display: none;
      cursor: pointer;
      font-size: 28px;
      color: #e9edef;
      margin-right: 2px;
    }

    .bot-warning {
      background: rgba(239, 68, 68, 0.14);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #ffd7d7;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      margin: 0 auto 14px;
      width: fit-content;
      max-width: 90%;
      text-align: center;
    }
@media (max-width: 1024px) {
  .sidebar {
    width: 330px;
    min-width: 300px;
  }

  .messages {
    padding: 16px 18px;
  }

  .message {
    max-width: 72%;
    font-size: 14px;
  }
}

@media (max-width: 768px) {
  body {
    overflow: hidden;
  }

  .app {
    height: 100dvh;
  }

  .sidebar {
    width: 100%;
    min-width: 100%;
  }

  .chat {
    display: none;
    width: 100%;
  }

  .app.chat-open .sidebar {
    display: none;
  }

  .app.chat-open .chat {
    display: flex;
  }

  .chat-header {
    height: 58px;
    padding: 8px 10px;
    gap: 8px;
  }

  .chat-header .avatar {
    width: 38px;
    height: 38px;
    font-size: 13px;
  }

  .chat-title {
    font-size: 15px;
  }

  .chat-status {
    font-size: 11px;
  }

  .header-buttons {
    gap: 4px;
  }

  .bot-toggle {
    padding: 7px 9px;
    font-size: 11px;
  }

  .menu-btn {
    width: 32px;
    height: 32px;
    font-size: 21px;
  }

  .back-btn {
    display: inline-block !important;
    font-size: 28px;
  }

  .messages {
    padding: 12px 8px;
  }

  .message {
    max-width: 86%;
    font-size: 13.5px;
    line-height: 1.35;
  }

  .message-text {
    padding-right: 42px;
  }

  .time {
    font-size: 10px;
  }

  .composer {
    min-height: 58px;
    padding: 8px;
    gap: 6px;
  }

  .icon-btn {
    display: none;
  }

  .composer textarea {
    min-height: 40px;
    font-size: 14px;
    padding: 11px 14px;
  }

  .send-btn {
    width: 42px;
    height: 42px;
    font-size: 17px;
  }

  .conversation {
    padding: 11px 12px;
  }

  .avatar {
    width: 44px;
    height: 44px;
  }
}

@media (max-width: 420px) {
  .brand-title {
    font-size: 15px;
  }

  .brand-subtitle {
    font-size: 11px;
  }

  .conversation-name {
    font-size: 14px;
  }

  .conversation-last {
    font-size: 12.5px;
  }

  .bot-toggle {
    max-width: 95px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .message {
    max-width: 90%;
  }
}
  </style>
</head>

<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand-avatar">W</div>
      <div>
        <div class="brand-title">Meu Inbox WhatsApp</div>
        <div class="brand-subtitle">Dashboard Meta API</div>
      </div>
    </div>

    <div class="search">
      <input id="searchInput" placeholder="Buscar conversa..." />
    </div>

    <div id="conversationList" class="conversation-list"></div>
  </aside>

  <main class="chat">
    <div id="chatHeader" class="chat-header">
      <span class="back-btn" onclick="closeChat()">‹</span>
      <div class="avatar">?</div>
      <div class="chat-header-info">
        <div class="chat-title">Selecione uma conversa</div>
        <div class="chat-status">Nenhum contato selecionado</div>
      </div>
      <div class="header-buttons">
        <button class="menu-btn">⋮</button>
      </div>
    </div>

    <div id="messages" class="messages">
      <div class="empty">
        <div class="empty-icon">💬</div>
        <div>Escolha uma conversa para começar</div>
      </div>
    </div>

    <div class="composer">
      <button class="icon-btn" disabled>😊</button>
      <textarea id="messageInput" placeholder="Digite uma mensagem..." disabled></textarea>
      <button id="sendButton" class="send-btn" disabled>➤</button>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script>
  const API_URL = "https://cursoslove-production.up.railway.app";

  let conversations = [];
  let selectedUser = null;
  let currentUserId = null;
  let lastMessagesHash = "";
  let botPaused = false;

  const app = document.getElementById("app");
  const conversationList = document.getElementById("conversationList");
  const messagesBox = document.getElementById("messages");
  const chatHeader = document.getElementById("chatHeader");
  const messageInput = document.getElementById("messageInput");
  const sendButton = document.getElementById("sendButton");
  const searchInput = document.getElementById("searchInput");
  const toast = document.getElementById("toast");

  async function loadConversations() {
    try {
      const res = await fetch(`${API_URL}/api/inbox/conversations?t=${Date.now()}`);
      const data = await res.json();

      conversations = data.conversations || [];
      renderConversations(filterConversations(searchInput.value));

      if (selectedUser) {
        const updated = conversations.find(c => c.id === selectedUser.id);
        if (updated) selectedUser = { ...selectedUser, ...updated };
      }
    } catch (error) {
      console.error(error);
      conversationList.innerHTML = "<p style='padding: 15px; color:#aebac1;'>Erro ao carregar conversas.</p>";
    }
  }

  function renderConversations(list) {
    conversationList.innerHTML = "";

    if (!list.length) {
      conversationList.innerHTML = "<p style='padding: 15px; color:#aebac1;'>Nenhuma conversa encontrada.</p>";
      return;
    }

    list.forEach(conv => {
      const div = document.createElement("div");
      div.className = "conversation";

      if (selectedUser && selectedUser.id === conv.id) {
        div.classList.add("active");
      }

      div.innerHTML = `
        <div class="avatar">${getInitials(conv.name || conv.celular)}</div>
        <div class="conversation-content">
          <div class="conversation-top">
            <div class="conversation-name">${escapeHtml(conv.name || conv.celular || "Sem nome")}</div>
            <div class="conversation-time">${formatShortDate(conv.last_message_at)}</div>
          </div>
          <div class="conversation-last">${escapeHtml(conv.last_message || "Sem mensagens ainda")}</div>
        </div>
      `;

      div.onclick = () => selectConversation(conv);
      conversationList.appendChild(div);
    });
  }

  async function selectConversation(user) {
    selectedUser = user;
    currentUserId = user.id;
    lastMessagesHash = "";
    app.classList.add("chat-open");

    botPaused = Boolean(Number(user.bot_paused || 0));

    renderChatHeader(user);

    messageInput.disabled = false;
    sendButton.disabled = false;

    renderConversations(filterConversations(searchInput.value));
    await loadMessages(user.id, true);
  }

  function renderChatHeader(user) {
    botPaused = Boolean(Number(user.bot_paused || botPaused || 0));

    chatHeader.innerHTML = `
      <span class="back-btn" onclick="closeChat()">‹</span>
      <div class="avatar">${getInitials(user.name || user.celular)}</div>
      <div class="chat-header-info">
        <div class="chat-title">${escapeHtml(user.name || user.celular || "Contato")}</div>
        <div class="chat-status">${escapeHtml(user.celular || "")}</div>
      </div>
      <div class="header-buttons">
        <button id="botToggleButton" class="bot-toggle ${botPaused ? "paused" : ""}" onclick="toggleBot()">
          ${botPaused ? "Bot pausado" : "Pausar bot"}
        </button>
        <button class="menu-btn">⋮</button>
      </div>
    `;
  }

  async function toggleBot() {
    if (!selectedUser) return;

    const newStatus = !botPaused;
    const button = document.getElementById("botToggleButton");

    if (button) {
      button.disabled = true;
      button.textContent = "Salvando...";
    }

    try {
      const res = await fetch(`${API_URL}/api/inbox/bot-status`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          userId: selectedUser.id,
          paused: newStatus
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.details || data.error || "Erro ao alterar status do bot.");
      }

      botPaused = newStatus;
      selectedUser.bot_paused = botPaused ? 1 : 0;

      renderChatHeader(selectedUser);
      showToast(botPaused ? "Bot pausado para esta conversa ✅" : "Bot ativado novamente ✅");
      await loadConversations();
      await loadMessages(selectedUser.id, true);
    } catch (error) {
      console.error(error);
      showToast("Sua API ainda precisa da rota /api/inbox/bot-status ⚠️");
      renderChatHeader(selectedUser);
    }
  }

  async function loadMessages(userId, forceScroll = false) {
    try {
      const res = await fetch(`${API_URL}/api/inbox/messages/${userId}?t=${Date.now()}`);
      const data = await res.json();

      const messages = data.messages || [];
      const newHash = JSON.stringify(messages.map(m => `${m.id}-${m.created_at}`));

      if (newHash !== lastMessagesHash || forceScroll) {
        lastMessagesHash = newHash;
        renderMessages(messages, forceScroll);
      }
    } catch (error) {
      console.error(error);
      messagesBox.innerHTML = "<div class='empty'><div class='empty-icon'>⚠️</div><div>Erro ao carregar mensagens.</div></div>";
    }
  }

  function renderMessages(messages, forceScroll = false) {
    const wasNearBottom =
      messagesBox.scrollHeight - messagesBox.scrollTop - messagesBox.clientHeight < 120;

    messagesBox.innerHTML = "";

    if (botPaused) {
      const warning = document.createElement("div");
      warning.className = "bot-warning";
      warning.textContent = "Bot pausado nesta conversa. Você pode responder manualmente e ativar depois.";
      messagesBox.appendChild(warning);
    }

    if (!messages.length) {
      messagesBox.innerHTML += "<div class='empty'><div class='empty-icon'>💬</div><div>Nenhuma mensagem ainda.</div></div>";
      return;
    }

    let lastDay = "";

    messages.forEach(msg => {
      const currentDay = getDayLabel(msg.created_at);

      if (currentDay !== lastDay) {
        lastDay = currentDay;

        const dayDiv = document.createElement("div");
        dayDiv.className = "day-separator";
        dayDiv.innerHTML = `<span>${currentDay}</span>`;
        messagesBox.appendChild(dayDiv);
      }

      const row = document.createElement("div");
      row.className = `message-row ${msg.direction === "in" ? "in" : "out"}`;

      const bubble = document.createElement("div");
      bubble.className = `message ${msg.direction === "in" ? "in" : "out"}`;

      bubble.innerHTML = `
        <span class="message-text">${escapeHtml(msg.message_text || "")}</span>
        <span class="time">${formatOnlyTime(msg.created_at)} ${msg.direction === "out" ? "✓✓" : ""}</span>
      `;

      row.appendChild(bubble);
      messagesBox.appendChild(row);
    });

    if (forceScroll || wasNearBottom) {
      messagesBox.scrollTop = messagesBox.scrollHeight;
    }
  }

  async function sendMessage() {
    const text = messageInput.value.trim();

    if (!text || !selectedUser) return;

    sendButton.disabled = true;

    try {
      const res = await fetch(`${API_URL}/api/inbox/send`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          userId: selectedUser.id,
          message: text
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.details || data.error || "Erro ao enviar mensagem.");
      }

      messageInput.value = "";
      showToast("Mensagem enviada ✅");
      await loadMessages(selectedUser.id, true);
      await loadConversations();
    } catch (error) {
      console.error(error);
      showToast("Erro ao enviar mensagem ❌");
    } finally {
      sendButton.disabled = false;
      messageInput.focus();
    }
  }

  function filterConversations(term = "") {
    const search = String(term || "").toLowerCase();

    return conversations.filter(conv => {
      return String(conv.name || "").toLowerCase().includes(search)
        || String(conv.celular || "").toLowerCase().includes(search)
        || String(conv.last_message || "").toLowerCase().includes(search);
    });
  }

  function closeChat() {
    app.classList.remove("chat-open");
  }

  function getInitials(value = "") {
    const text = String(value || "").trim();

    if (!text) return "?";

    const parts = text.split(" ").filter(Boolean);

    if (parts.length >= 2) {
      return `${parts[0][0]}${parts[1][0]}`.toUpperCase();
    }

    return text.slice(0, 2).toUpperCase();
  }

  function escapeHtml(text) {
    return String(text || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");
  }

  function formatShortDate(date) {
    if (!date) return "";

    return new Date(date).toLocaleTimeString("pt-BR", {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function formatOnlyTime(date) {
    if (!date) return "";

    return new Date(date).toLocaleTimeString("pt-BR", {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function getDayLabel(date) {
    if (!date) return "";

    const d = new Date(date);
    const today = new Date();
    const yesterday = new Date();
    yesterday.setDate(today.getDate() - 1);

    const sameDay = (a, b) =>
      a.getDate() === b.getDate() &&
      a.getMonth() === b.getMonth() &&
      a.getFullYear() === b.getFullYear();

    if (sameDay(d, today)) return "Hoje";
    if (sameDay(d, yesterday)) return "Ontem";

    return d.toLocaleDateString("pt-BR", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    });
  }

  function showToast(message) {
    toast.textContent = message;
    toast.style.display = "block";

    clearTimeout(showToast.timer);
    showToast.timer = setTimeout(() => {
      toast.style.display = "none";
    }, 2800);
  }

  searchInput.addEventListener("input", () => {
    renderConversations(filterConversations(searchInput.value));
  });

  sendButton.addEventListener("click", sendMessage);

  messageInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  loadConversations();

  setInterval(async () => {
    await loadConversations();

    if (currentUserId) {
      await loadMessages(currentUserId);
    }
  }, 3000);
</script>
</body>
</html>
