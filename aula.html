<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aula - Influencer Academy</title>

  <style>
    :root{
      --bg:#f7f1eb;
      --paper:#fffaf7;
      --white:#fff;
      --text:#3f2d26;
      --muted:#8a7166;
      --line:#ead7ce;
      --rose:#d98f82;
      --rose-dark:#c87465;
      --rose-soft:#f8dfd8;
      --brown:#563b31;
      --shadow:0 24px 70px rgba(83,54,42,.11);
      --green:#2e8b4d;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:"Segoe UI",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 0% 0%,rgba(217,143,130,.18),transparent 28%),
        radial-gradient(circle at 100% 100%,rgba(217,143,130,.14),transparent 28%),
        linear-gradient(180deg,#fbf7f3 0%,#f6efe9 100%);
    }

    a{text-decoration:none;color:inherit}

    .page{
      max-width:1180px;
      margin:0 auto;
      padding:28px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      background:rgba(255,255,255,.78);
      border:1px solid var(--line);
      border-radius:28px;
      padding:18px 22px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      margin-bottom:24px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo{
      width:52px;
      height:52px;
      border-radius:18px;
      background:linear-gradient(135deg,var(--rose),#e8aa9d);
      display:grid;
      place-items:center;
      color:#fff;
      font-weight:950;
      font-size:18px;
    }

    .brand strong{
      display:block;
      font-size:22px;
      letter-spacing:-.03em;
    }

    .brand span{
      display:block;
      color:var(--muted);
      font-size:13px;
      margin-top:3px;
      font-weight:700;
    }

    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      min-height:48px;
      padding:0 18px;
      border-radius:16px;
      font-weight:950;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.2s ease;
    }

    .btn.primary{
      background:linear-gradient(135deg,var(--rose),var(--rose-dark));
      color:#fff;
      box-shadow:0 15px 30px rgba(217,143,130,.26);
    }

    .btn.light{
      background:#fff;
      color:var(--brown);
      border:1px solid var(--line);
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .hero{
      background:
        radial-gradient(circle at 95% 5%,rgba(217,143,130,.20),transparent 26%),
        linear-gradient(135deg,rgba(255,255,255,.92),rgba(255,248,244,.92));
      border:1px solid var(--line);
      border-radius:38px;
      padding:38px;
      box-shadow:var(--shadow);
      margin-bottom:24px;
    }

    .eyebrow{
      display:inline-flex;
      padding:10px 14px;
      border-radius:999px;
      background:var(--rose-soft);
      color:var(--rose-dark);
      font-weight:950;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.06em;
      margin-bottom:18px;
    }

    h1{
      margin:0;
      max-width:920px;
      font-size:54px;
      line-height:1.03;
      letter-spacing:-.055em;
    }

    .hero p{
      margin:18px 0 0;
      max-width:850px;
      color:var(--muted);
      line-height:1.75;
      font-size:18px;
    }

    .progress-box{
      margin-top:26px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
    }

    .progress-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
      color:var(--brown);
      font-weight:900;
    }

    .progress-bar{
      height:14px;
      border-radius:999px;
      overflow:hidden;
      background:#f0e0d8;
    }

    .progress-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--rose),var(--rose-dark));
      transition:.3s ease;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 360px;
      gap:24px;
      align-items:start;
    }

    .panel{
      background:rgba(255,255,255,.88);
      border:1px solid var(--line);
      border-radius:34px;
      padding:30px;
      box-shadow:var(--shadow);
      margin-bottom:24px;
    }

    .panel h2{
      margin:0 0 14px;
      font-size:34px;
      letter-spacing:-.04em;
    }

    .panel h3{
      margin:24px 0 10px;
      font-size:26px;
      letter-spacing:-.03em;
    }

    .panel p{
      color:var(--muted);
      line-height:1.8;
      font-size:17px;
    }

    .panel ul,
    .panel ol{
      color:var(--muted);
      line-height:1.8;
      font-size:16px;
      padding-left:22px;
    }

    .teaching-card{
      padding:22px;
      border-radius:26px;
      border:1px solid var(--line);
      background:#fff7f3;
      margin:18px 0;
    }

    .teaching-card strong{
      color:var(--brown);
    }

    .example-box{
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      padding:20px;
      margin:18px 0;
    }

    .example-box code{
      display:block;
      white-space:pre-wrap;
      background:#3f2d26;
      color:#fff;
      padding:16px;
      border-radius:18px;
      line-height:1.7;
      font-family:Consolas,monospace;
      margin-top:12px;
    }

    .task-box{
      background:linear-gradient(135deg,#fff,#fff4ef);
      border:1px solid #e4afa3;
      border-radius:26px;
      padding:24px;
      margin-top:22px;
    }

    .task-box h3{
      margin-top:0;
    }

    .side{
      position:sticky;
      top:24px;
    }

    .side-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:30px;
      padding:24px;
      box-shadow:var(--shadow);
      margin-bottom:18px;
    }

    .side-card h3{
      margin:0 0 12px;
      font-size:24px;
    }

    .side-card p{
      color:var(--muted);
      line-height:1.65;
    }

    .print-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-top:18px;
    }

    .print-card{
      border:1px solid var(--line);
      border-radius:20px;
      overflow:hidden;
      background:#fff;
      cursor:zoom-in;
      box-shadow:0 12px 24px rgba(83,54,42,.06);
    }

    .print-card img{
      width:100%;
      display:block;
      aspect-ratio:4/5;
      object-fit:cover;
    }

    .print-card span{
      display:block;
      padding:12px;
      font-weight:850;
      color:var(--brown);
    }

    .blocked{
      background:#fff;
      border:1px solid var(--line);
      border-radius:34px;
      padding:34px;
      box-shadow:var(--shadow);
      text-align:center;
    }

    .blocked h1{
      font-size:42px;
      margin:auto;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(26,18,15,.82);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:28px;
    }

    .modal.show{
      display:flex;
    }

    .modal img{
      max-width:min(92vw,760px);
      max-height:88vh;
      border-radius:24px;
      box-shadow:0 30px 80px rgba(0,0,0,.35);
    }

    .modal button{
      position:absolute;
      top:24px;
      right:24px;
      border:none;
      background:#fff;
      color:var(--brown);
      border-radius:999px;
      padding:12px 16px;
      font-weight:950;
      cursor:pointer;
    }

    @media(max-width:980px){
      .grid{
        grid-template-columns:1fr;
      }

      .side{
        position:relative;
        top:0;
      }

      .print-grid{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media(max-width:680px){
      .page{
        padding:14px;
      }

      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      h1{
        font-size:38px;
      }

      .hero{
        padding:24px;
      }

      .panel{
        padding:22px;
      }

      .print-grid{
        grid-template-columns:1fr;
      }

      .top-actions{
        width:100%;
      }

      .top-actions .btn{
        width:100%;
      }
    }
  </style>
</head>

<body>
  <main class="page" id="app"></main>

  <div class="modal" id="imageModal">
    <button id="closeModal">Fechar</button>
    <img id="modalImg" src="" alt="Print ampliado">
  </div>

  <script>
    const printFiles = [
      ["Instagram Profile","assets/prints/instagram-profile.png"],
      ["Instagram Reels","assets/prints/instagram-reels.png"],
      ["Instagram Insights","assets/prints/instagram-insights.png"],
      ["Canva Brand Kit","assets/prints/canva-brand.png"],
      ["Canva Carousel","assets/prints/canva-carousel.png"],
      ["Canva Stories","assets/prints/canva-stories.png"],
      ["CapCut Timeline","assets/prints/capcut-timeline.png"],
      ["CapCut Captions","assets/prints/capcut-captions.png"],
      ["CapCut Export","assets/prints/capcut-export.png"],
      ["AI Script","assets/prints/ai-script.png"],
      ["AI Video","assets/prints/ai-video.png"],
      ["Workflow Calendar","assets/prints/workflow-calendar.png"]
    ];

    const modules = [
      {tag:"01",title:"Posicionamento e nicho",desc:"Defina o espaço que você quer ocupar e para quem deseja comunicar.",prints:[0,1,3],lessons:["Escolha do nicho principal","Público ideal e dores reais","Promessa clara do perfil","Tom de voz da criadora","Diferenciação no mercado","Conteúdos de autoridade","Linha editorial inicial","Tarefa final do posicionamento"]},
      {tag:"02",title:"Bio, estética e primeira impressão",desc:"Transforme seu perfil em uma vitrine clara, bonita e confiável.",prints:[0,3,4],lessons:["Foto de perfil profissional","Nome pesquisável","Bio com proposta clara","Destaques organizados","Capas e identidade visual","Paleta e fontes","Feed com coerência","Checklist final do perfil"]},
      {tag:"03",title:"Ideias e pilares de conteúdo",desc:"Organize temas para não depender só de inspiração.",prints:[1,4,11],lessons:["3 pilares principais","Ideias por etapa do funil","Conteúdo de conexão","Conteúdo educativo","Conteúdo de autoridade","Conteúdo de venda leve","Banco de ideias","Calendário semanal"]},
      {tag:"04",title:"Reels com gancho e retenção",desc:"Crie vídeos curtos com começo forte e estrutura clara.",prints:[1,6,7],lessons:["Gancho nos 3 segundos","Promessa do vídeo","Roteiro curto","Cortes dinâmicos","Legendas estratégicas","CTA natural","Análise de retenção","Repetição de formatos"]},
      {tag:"05",title:"Stories para conexão",desc:"Use stories para relacionamento, desejo e confiança.",prints:[5,0,11],lessons:["Bastidores reais","Enquetes e caixinhas","Prova social","Sequência de storytelling","Stories de rotina","CTA sem forçar","Oferta leve","Calendário de stories"]},
      {tag:"06",title:"Canva para identidade visual",desc:"Crie posts, capas e carrosséis com aparência profissional.",prints:[3,4,5],lessons:["Brand Kit simples","Templates 4:5","Capas de Reels","Carrossel educativo","Stories com CTA","Organização em pastas","Exportação correta","Revisão visual"]},
      {tag:"07",title:"CapCut para edição dinâmica",desc:"Edite vídeos com ritmo, legendas e acabamento limpo.",prints:[6,7,8],lessons:["Timeline organizada","Cortes de pausa","Zooms e movimentos","Legenda automática","Destaque de palavras","Áudio e ruído","Exportação ideal","Checklist final"]},
      {tag:"08",title:"IA para roteiro e vídeo",desc:"Use IA para destravar criatividade e produção.",prints:[9,10,11],lessons:["Prompt de ideias","Roteiro com IA","Ganchos alternativos","Cenas de apoio","Descrição para vídeo IA","Legendas com IA","Calendário com IA","Humanização do resultado"]},
      {tag:"09",title:"Métricas e crescimento",desc:"Leia dados e transforme insight em decisão.",prints:[2,1,11],lessons:["Alcance e impressões","Retenção dos Reels","Salvamentos","Compartilhamentos","Novos seguidores","Formatos vencedores","Ajuste semanal","Relatório simples"]},
      {tag:"10",title:"Monetização e parcerias",desc:"Prepare sua imagem para atrair oportunidades.",prints:[0,3,11],lessons:["Mídia kit inicial","Proposta para marcas","Valores e entregáveis","Prova social","Abordagem profissional","Organização de collabs","Pós-venda","Plano de monetização"]}
    ];

    const params = new URLSearchParams(window.location.search);
    const moduleIndex = Number(params.get("m") || 0);
    const lessonIndex = Number(params.get("l") || 0);

// PRINTS POR AULA PATCH START
    function pad2(value){
      return String(value + 1).padStart(2, "0");
    }

    printFiles.length = 0;

    const lessonPrintBase = `assets/aulas/modulo-${pad2(moduleIndex)}/aula-${pad2(lessonIndex)}`;

    printFiles.push(
      ["Instagram - aplicação prática", `${lessonPrintBase}/print-01-instagram.png`],
      ["Canva - modelo visual", `${lessonPrintBase}/print-02-canva.png`],
      ["CapCut - vídeo passo a passo", `${lessonPrintBase}/print-03-capcut.png`],
      ["IA - prompt da aula", `${lessonPrintBase}/print-04-ia.png`]
    );

    modules.forEach(module => {
      module.prints = [0, 1, 2, 3];
    });
// PRINTS POR AULA PATCH END

    function key(m,l){
      return `m${m}-l${l}`;
    }

    function getCompleted(){
      try {
        return JSON.parse(localStorage.getItem("ia_completed_lessons") || "[]");
      } catch(e) {
        return [];
      }
    }

    function saveCompleted(arr){
      localStorage.setItem("ia_completed_lessons", JSON.stringify(arr));
    }

    function linearIndex(m,l){
      return (m * 8) + l;
    }

    function isUnlocked(m,l){
      if (m === 0 && l === 0) return true;

      try {
        const paid = JSON.parse(localStorage.getItem("ia_paid_unlocks") || "[]");
        if (paid.includes(key(m,l))) return true;
      } catch(e) {}

      const previous = linearIndex(m,l) - 1;
      const pm = Math.floor(previous / 8);
      const pl = previous % 8;

      return getCompleted().includes(key(pm,pl));
    }

    function getProgress(){
      const total = modules.length * 8;
      const completed = getCompleted().length;
      return Math.round((completed / total) * 100);
    }

    function nextLessonUrl(){
      let nextM = moduleIndex;
      let nextL = lessonIndex + 1;

      if (nextL >= 8) {
        nextM++;
        nextL = 0;
      }

      if (nextM >= modules.length) {
        return "area.html#modules";
      }

      return `aula.html?m=${nextM}&l=${nextL}`;
    }

    function completeLesson(){
      const completed = getCompleted();
      const currentKey = key(moduleIndex, lessonIndex);

      if (!completed.includes(currentKey)) {
        completed.push(currentKey);
        saveCompleted(completed);
      }

      renderPage(true);
    }

    function openImage(src){
      document.getElementById("modalImg").src = src;
      document.getElementById("imageModal").classList.add("show");
    }

    document.getElementById("closeModal").addEventListener("click",()=>{
      document.getElementById("imageModal").classList.remove("show");
    });

    document.getElementById("imageModal").addEventListener("click",(e)=>{
      if(e.target.id === "imageModal") {
        e.currentTarget.classList.remove("show");
      }
    });

    function buildTeachingContent(module, lesson){
      return `
        <h2>O que você vai aprender aqui</h2>
        <p>
          Nesta aula, você vai entender como colocar em prática <strong>${lesson.toLowerCase()}</strong> dentro da sua estratégia como influenciadora.
          A ideia não é ficar só na teoria: é transformar o conteúdo em uma ação real no seu perfil.
        </p>

        <div class="teaching-card">
          <strong>Ideia principal:</strong>
          uma criadora cresce com mais consistência quando entende o que está fazendo, por que está fazendo e como perceber se funcionou.
          Essa aula existe para tirar você do improviso e te colocar em um processo mais profissional.
        </div>

        <h3>1. Antes de aplicar, entenda por que isso importa</h3>
        <p>
          O módulo <strong>${module.title}</strong> faz parte da construção da sua presença digital. 
          Ele ajuda você a criar um perfil mais claro, mais bonito e mais fácil de ser entendido por quem chega pela primeira vez.
          Quando essa etapa é ignorada, a criadora até posta, mas o público não entende exatamente por que deveria acompanhar, confiar ou comprar dela.
        </p>

        <h3>2. Como aplicar isso no seu perfil</h3>
        <ol>
          <li>Abra seu Instagram e observe seu perfil como se você fosse uma pessoa nova chegando ali.</li>
          <li>Veja se a mensagem principal está clara em poucos segundos.</li>
          <li>Identifique o que está confuso, genérico ou desalinhado com o público que você quer atrair.</li>
          <li>Aplique uma melhoria pequena, mas visível, com base nesta aula.</li>
          <li>Depois de publicar ou ajustar, acompanhe se houve mais respostas, cliques, salvamentos ou interações.</li>
        </ol>

        <h3>3. Exemplo prático</h3>
        <div class="example-box">
          <p>
            Em vez de pensar apenas “preciso postar mais”, pense como uma criadora estratégica:
          </p>
          <code>Objetivo da semana: fortalecer minha presença.
Ação: aplicar ${lesson.toLowerCase()}.
Formato: 1 Reel + 3 stories + 1 post/carrossel.
Métrica observada: retenção, respostas, salvamentos e novos seguidores.</code>
        </div>

        <h3>4. Erros que podem te travar nessa etapa</h3>
        <ul>
          <li>Copiar outras criadoras sem adaptar para a sua realidade.</li>
          <li>Postar apenas quando sente inspiração, sem processo.</li>
          <li>Focar só em estética e esquecer clareza de mensagem.</li>
          <li>Ignorar métricas e não revisar o que funcionou.</li>
          <li>Usar ferramentas como Canva, CapCut ou IA sem uma intenção estratégica.</li>
        </ul>

        <h3>5. Checklist rápido da aula</h3>
        <ul>
          <li>Eu entendi o objetivo dessa aula?</li>
          <li>Eu apliquei pelo menos uma melhoria no meu perfil ou conteúdo?</li>
          <li>Eu tenho um exemplo prático salvo para repetir depois?</li>
          <li>Eu sei qual métrica vou observar?</li>
          <li>Eu consigo explicar essa etapa com minhas próprias palavras?</li>
        </ul>

        <div class="task-box">
          <h3>Tarefa de casa</h3>
          <p>
            Faça uma aplicação real desta aula hoje. Pode ser ajustar um trecho da bio, criar um roteiro,
            organizar um template, editar um vídeo, revisar métricas ou montar uma sequência de stories.
          </p>
          <p>
            Use esta atividade como exercício de fixação. Quando terminar, marque a aula como concluída para acompanhar seu progresso.
          </p>
        </div>
      `;
    }

    function renderBlocked(){
      document.getElementById("app").innerHTML = `
        <div class="blocked">
          <span class="eyebrow">Aula bloqueada</span>
          <h1>Esta aula ainda não está liberada na sequência atual. Você pode continuar pela trilha normal ou liberar este conteúdo de forma avulsa.</h1>
          <p style="color:#8a7166;line-height:1.7;font-size:18px;max-width:680px;margin:18px auto">
            A trilha foi organizada em sequência para você evoluir com clareza. 
            Volte para os módulos e continue pela próxima aula liberada.
          </p>
          <a class="btn light" href="area.html#modules">Voltar para os módulos</a> <a class="btn primary" href="desbloqueio.html?m=${moduleIndex}&l=${lessonIndex}">Desbloquear por R$ 14,99</a>
        </div>
      `;
    }

    function renderPage(justCompleted = false){
      const module = modules[moduleIndex];
      const lesson = module.lessons[lessonIndex];
      const done = getCompleted().includes(key(moduleIndex, lessonIndex));
      const progress = getProgress();

      document.getElementById("app").innerHTML = `
        <header class="topbar">
          <div class="brand">
            <div class="logo">IA</div>
            <div>
              <strong>Influencer Academy</strong>
              <span>Módulo ${module.tag} · Aula ${lessonIndex + 1} de 8</span>
            </div>
          </div>

          <div class="top-actions">
            <a class="btn light" href="area.html#modules">← Voltar aos módulos</a>
            ${done ? `<a class="btn primary" href="${nextLessonUrl()}">Próxima aula →</a>` : ""}
          </div>
        </header>

        <section class="hero">
          <span class="eyebrow">${module.title}</span>
          <h1>${lesson}</h1>
          <p>${module.desc} Nesta aula, você vai estudar com mais profundidade, ver exemplos e aplicar uma tarefa prática antes de avançar.</p>

          <div class="progress-box">
            <div class="progress-head">
              <span>Progresso geral da trilha</span>
              <span>${progress}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${progress}%"></div>
            </div>
          </div>
        </section>

        <section class="grid">
          <article class="panel">
            ${justCompleted ? `
              <div class="teaching-card" style="background:#eefaf1;border-color:#bce8cb;color:#2e8b4d">
                <strong>Parabéns!</strong> Aula marcada como concluída. Você já pode continuar sua jornada.
              </div>
            ` : ""}

            ${buildTeachingContent(module, lesson)}

            <h2>4 prints passo a passo desta aula</h2>
            <p>Cada imagem abaixo representa um app diferente aplicado nesta aula: Instagram, Canva, CapCut e IA. Clique para ampliar e estudar o passo a passo.</p>

            <div class="print-grid">
              ${module.prints.map(idx => `
                <div class="print-card" onclick="openImage('${printFiles[idx][1]}')">
                  <img src="${printFiles[idx][1]}" alt="${printFiles[idx][0]}">
                  <span>${printFiles[idx][0]}</span>
                </div>
              `).join("")}
            </div>

            <div class="task-box">
              <h3>Finalizar aula</h3>
              <p>
                Marque como concluída somente depois de estudar o conteúdo e fazer a tarefa prática.
                Isso libera a próxima aula da sequência.
              </p>

              <button class="btn primary" onclick="completeLesson()">
                ${done ? "Aula concluída ✓" : "Concluir aula"}
              </button>

              ${done ? `<a class="btn light" style="margin-left:8px" href="${nextLessonUrl()}">Ir para próxima aula</a>` : ""}
            </div>
          </article>

          <aside class="side">
            <div class="side-card">
              <h3>Resumo da aula</h3>
              <p><strong>Módulo:</strong> ${module.title}</p>
              <p><strong>Aula:</strong> ${lesson}</p>
              <p><strong>Status:</strong> ${done ? "Concluída" : "Em andamento"}</p>
            </div>

            <div class="side-card">
              <h3>Como aproveitar melhor</h3>
              <p>Leia o conteúdo, abra os guias visuais, aplique no seu perfil e marque como concluída quando terminar.</p>
            </div>

            <div class="side-card">
              <h3>Próximo passo</h3>
              <p>${done ? "A próxima aula já está liberada." : "Quando terminar, avance para o próximo conteúdo da trilha."}</p>
            </div>
          </aside>
        </section>
      `;
    }

    if (!modules[moduleIndex] || !modules[moduleIndex].lessons[lessonIndex]) {
      window.location.href = "area.html#modules";
    } else if (!isUnlocked(moduleIndex, lessonIndex)) {
      renderBlocked();
    } else {
      renderPage();
    }
  </script>
</body>
</html>
